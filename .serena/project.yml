initial_prompt: |
  This is the Veilstone voxel_sandbox project: a Python voxel sandbox built with Pyglet, ModernGL, and NumPy.

  Always prefer Serena symbolic navigation before reading large files, especially render/window.py.
  Start coding sessions by reading relevant Serena memories.
  Use get_symbols_overview, find_symbol, find_referencing_symbols, and diagnostics before broad Read/Grep exploration.
  Use symbolic edit tools for targeted function/class changes when appropriate.

  Memory policy:
  - Update memories only for stable project knowledge.
  - Good memories: architecture decisions, important commands, test/lint/build workflow, coding conventions, important module responsibilities, recurring pitfalls.
  - Bad memories: temporary task notes, secrets, tokens, noisy logs, one-off debugging observations, raw stack traces.
  - If a phase changes architecture, workflow, commands, or recurring pitfalls, update or create the relevant memory before finishing.

  Index policy:
  - Use Serena index/symbol tools for code navigation.
  - If symbols look stale or missing after large refactors, ask to refresh/rebuild the Serena project index.

