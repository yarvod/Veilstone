name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  native-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macOS
            arch: arm64
          - os: windows-latest
            platform: Windows
            arch: x64
          - os: ubuntu-latest
            platform: Linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install Linux OpenGL dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1-mesa-dev libgl1-mesa-dev zip

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - run: uv sync --frozen

      - name: Run tests
        if: runner.os == 'macOS'
        run: uv run python scripts/run_ci_tests.py

      - name: Run platform-neutral tests
        if: runner.os == 'Windows'
        run: uv run python scripts/run_ci_tests.py -m "not smoke"

      - name: Run tests virtual display
        if: runner.os == 'Linux'
        run: xvfb-run uv run python scripts/run_ci_tests.py

      - run: uv run python scripts/build_app.py

      - name: Smoke test macOS package
        if: runner.os == 'macOS'
        run: |
          VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" dist/Veilstone.app/Contents/MacOS/Veilstone --version
          VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" dist/Veilstone.app/Contents/MacOS/Veilstone --verify-package
          VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" dist/Veilstone.app/Contents/MacOS/Veilstone --smoke-test

      - name: Smoke test Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:VEILSTONE_DATA_DIR = "$env:RUNNER_TEMP\veilstone"
          .\dist\Veilstone\Veilstone.exe --version
          .\dist\Veilstone\Veilstone.exe --verify-package
          .\dist\Veilstone\Veilstone.exe server --smoke-test

      - name: Smoke test Linux package
        if: runner.os == 'Linux'
        run: |
          VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" dist/Veilstone/Veilstone --version
          VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" dist/Veilstone/Veilstone --verify-package
          VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" xvfb-run dist/Veilstone/Veilstone --smoke-test

      - name: Archive Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tagSlug = "${{ github.ref_name }}" -replace '[^A-Za-z0-9_-]', '_'
          $assetName = "Veilstone_${{ matrix.platform }}_${{ matrix.arch }}_$tagSlug"
          Compress-Archive -Path .\dist\Veilstone -DestinationPath ".\dist\$assetName.zip" -Force

      - name: Archive Unix package
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag_slug="$(printf '%s' "$GITHUB_REF_NAME" | sed 's/[^A-Za-z0-9_-]/_/g')"
          asset_name="Veilstone_${{ matrix.platform }}_${{ matrix.arch }}_${tag_slug}"
          cd dist
          if [ -d "Veilstone.app" ]; then
            zip -r "${asset_name}.zip" Veilstone.app
          else
            zip -r "${asset_name}.zip" Veilstone
          fi

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: Veilstone-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.ref_name }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: native-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: Veilstone ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/*.zip
