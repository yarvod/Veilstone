name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  native-build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest -q
      - run: uv run python scripts/build_app.py
      - name: Smoke test macOS package
        if: runner.os == 'macOS'
        run: VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" dist/Veilstone.app/Contents/MacOS/Veilstone --smoke-test
      - name: Smoke test Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:VEILSTONE_DATA_DIR = "$env:RUNNER_TEMP\veilstone"
          .\dist\Veilstone\Veilstone.exe --smoke-test
      - name: Smoke test Linux package
        if: runner.os == 'Linux'
        run: VEILSTONE_DATA_DIR="$RUNNER_TEMP/veilstone" xvfb-run dist/Veilstone/Veilstone --smoke-test
      - uses: actions/upload-artifact@v4
        with:
          name: Veilstone-${{ runner.os }}
          path: dist/Veilstone*
          if-no-files-found: error
